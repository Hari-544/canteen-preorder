<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canteen Pre-order | Ticket</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-page="ticket">
<div class="bg-orb orb-a"></div>
<div class="bg-orb orb-b"></div>

<main class="page page-center">
<section class="panel ticket-panel">
<p class="eyebrow">Order Confirmed</p>
<h1>Pickup Ticket</h1>

<div id="ticket"></div>
<div class="actions center ticket-actions">

<button id="newOrderBtn" type="button">Start New Order</button>
<button id="printBtn" type="button" class="secondary">Print Ticket</button>
</div>
</section>
</main>
<script src="script.js"></script>
