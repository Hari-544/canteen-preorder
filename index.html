<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canteen Pre-order | Student Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-page="details">
<div class="bg-orb orb-a"></div>
<div class="bg-orb orb-b"></div>

<main class="page page-center">
<section class="panel details-panel">
<p class="eyebrow">Campus Quick Serve</p>
<h1>Pre-order your meal in seconds</h1>
<p class="sub">Skip queues, pick your slot, and collect hot food on time.</p>

<form id="studentForm" class="stack">
<label for="name">Name</label>
<input id="name" placeholder="Enter your full name" required>

<label for="reg">Registration No</label>
<input id="reg" placeholder="24B91A61H9" maxlength="10" required>

<label for="phone">Phone</label>
<input id="phone" type="tel" inputmode="numeric" placeholder="10-digit mobile number" required>

<label for="email">Email</label>
<input id="email" type="email" placeholder="you@college.edu" required>

<button type="submit">Continue to Menu</button>
</form>

<p id="detailsMessage" class="message" aria-live="polite"></p>
</section>
</main>
<script src="script.js"></script>
</body>
</html>
